version: "3.8"

services:
  fingpt_mock:
    image: node:18-slim
    container_name: fingpt-mock
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./simple-fingpt.js:/app/server.js
    working_dir: /app
    command: >
      bash -c "echo 'Starting standalone FinGPT mock service' &&
      npm install express cors &&
      node server.js"
