services:
  backend:
    image: mcr.microsoft.com/devcontainers/python:3.11
    volumes:
      - ..:/workspaces/HTXV2
    working_dir: /workspaces/HTXV2/backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://htxv2_user:password@postgres:5432/htxv2
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    command: sleep infinity

  frontend:
    image: mcr.microsoft.com/devcontainers/javascript-node:18
    volumes:
      - ..:/workspaces/HTXV2
    working_dir: /workspaces/HTXV2/frontend
    ports:
      - "3000:3000"
    command: sleep infinity

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: htxv2
      POSTGRES_USER: htxv2_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U htxv2_user -d htxv2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: