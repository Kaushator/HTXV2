[tool:pytest]
# pytest configuration for HTXV2 backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    unit: Unit tests
    integration: Integration tests  
    slow: Slow running tests
    api: API endpoint tests
asyncio_mode = auto