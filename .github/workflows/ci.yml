name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Install test reporters
        working-directory: backend
        run: |
          pip install pytest-html
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app
      - name: Run tests
        working-directory: backend
        run: |
          pytest -q --junitxml=pytest-junit.xml --html=pytest-report.html --self-contained-html
      - name: Upload backend test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: |
            backend/pytest-junit.xml
            backend/pytest-report.html

  frontend:
    name: Frontend (lint + type-check + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type Check
        working-directory: frontend
        run: npm run type-check
      - name: Install test tooling (no-save)
        working-directory: frontend
        run: |
          npm install --no-save -D vitest @vitest/coverage-v8 jsdom @testing-library/react @testing-library/jest-dom @testing-library/user-event
      - name: Frontend tests (Vitest)
        working-directory: frontend
        run: npx vitest run --coverage --reporter=dot
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
      - name: Run TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog@v3
        with:
          scan: filesystem
          path: .
          extra_args: --no-update --fail --only-verified
