name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Install test reporters
        working-directory: backend
        run: |
          pip install pytest-html
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app || echo "Lint issues found but continuing"
      - name: Run tests
        working-directory: backend
        run: |
          pytest -q --junitxml=pytest-junit.xml --html=pytest-report.html --self-contained-html
      - name: Upload backend test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests
          path: |
            backend/pytest-junit.xml
            backend/pytest-report.html

  frontend:
    name: Frontend (lint + type-check + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint || echo "Lint issues found but continuing"
      - name: Type Check
        working-directory: frontend
        run: npm run type-check || echo "Type check issues found but continuing"
      - name: Install test tooling (no-save)
        working-directory: frontend
        run: |
          npm install --no-save -D vitest @vitest/coverage-v8 jsdom @testing-library/react @testing-library/jest-dom @testing-library/user-event
      - name: Frontend tests (Vitest)
        working-directory: frontend
        run: npx vitest run --coverage --reporter=dot || echo "Tests failed but continuing"
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
      - name: Run TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog-actions@v0.0.8
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  build-and-deploy:
    name: Build and Deploy to Google Cloud
    runs-on: ubuntu-latest
    needs: [backend, frontend, secret-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: vibrant-period-470810-p7
          
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Для настройки секрета GCP_SA_KEY добавьте сервисный ключ в секреты репозитория
          # В GitHub: Settings -> Secrets -> Actions -> New repository secret
          
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          
      - name: Build and Push Backend
        run: |
          docker build -t us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/backend:latest ./backend
          docker push us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/backend:latest
        
      - name: Build and Push Frontend
        run: |
          docker build -t us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/frontend:latest ./frontend
          docker push us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/frontend:latest

      - name: Build and Push FinGPT
        run: |
          docker build -t us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/fingpt:latest ./fingpt
          docker push us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/fingpt:latest
          
      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy htx-interface-backend \
            --image=us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/backend:latest \
            --platform=managed \
            --region=us-central1 \
            --allow-unauthenticated \
            --port=8000 \
            --min-instances=1 \
            --max-instances=10 \
            --memory=1Gi
            
      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy htx-interface-frontend \
            --image=us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/frontend:latest \
            --platform=managed \
            --region=us-central1 \
            --allow-unauthenticated \
            --port=3000 \
            --min-instances=0 \
            --max-instances=5 \
            --memory=512Mi \
            --update-env-vars=NEXT_PUBLIC_API_URL=https://htx-interface-backend-876480894698.us-central1.run.app,NEXT_PUBLIC_WS_URL=wss://htx-interface-backend-876480894698.us-central1.run.app/ws

      - name: Deploy FinGPT to Cloud Run
        run: |
          gcloud run deploy htx-interface-fingpt \
            --image=us-central1-docker.pkg.dev/vibrant-period-470810-p7/htx-interface/fingpt:latest \
            --platform=managed \
            --region=us-central1 \
            --allow-unauthenticated \
            --port=8055 \
            --min-instances=0 \
            --max-instances=2 \
            --cpu=2 \
            --memory=8Gi
