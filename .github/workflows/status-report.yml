name: Статус тестирования

on:
  workflow_dispatch: # Ручной запуск
  schedule:
    - cron: "0 0 * * *" # Ежедневно в полночь по UTC

jobs:
  send-status-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jinja2

      - name: Run status report script
        run: python .github/scripts/status_report.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send status report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: HTXEnterface_v2 Status Report
          body: file://${{ github.workspace }}/status_report.html
          html_body: true
          to: ${{ secrets.MAIL_RECIPIENTS }}
          from: GitHub Actions
